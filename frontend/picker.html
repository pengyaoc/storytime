<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Storytime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100dvh;
      font-family: 'Nunito', sans-serif;
      overscroll-behavior: none;
    }

    .header-wrap {
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header {
      padding: 28px 24px 16px;
      text-align: center;
      pointer-events: none;
      max-width: 960px;
      margin: 0 auto;
    }

    .header-title {
      font-size: clamp(28px, 8vw, 42px);
      font-weight: 900;
      color: #5a3e28;
      text-shadow: 0 3px 0 rgba(255,255,255,0.5);
      letter-spacing: -0.5px;
    }

    .header-sub {
      font-size: clamp(13px, 3.5vw, 16px);
      font-weight: 700;
      color: #9a7a5a;
      margin-top: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 8px 20px 36px;
      max-width: 960px;
      margin: 0 auto;
    }

    @media (min-width: 560px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (min-width: 780px) {
      .grid { grid-template-columns: repeat(4, 1fr); gap: 20px; }
    }

    .book-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(90,60,20,0.13), 0 2px 6px rgba(90,60,20,0.08);
      cursor: pointer;
      text-decoration: none;
      display: block;
      transform: translateY(0) scale(1);
      transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      animation: pop-in 0.38s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .book-card:hover {
      transform: translateY(-5px) scale(1.025);
      box-shadow: 0 16px 40px rgba(90,60,20,0.2), 0 4px 12px rgba(90,60,20,0.1);
    }

    .book-card:active {
      transform: scale(0.96);
      box-shadow: 0 3px 10px rgba(90,60,20,0.12);
      transition-duration: 0.08s;
    }

    .book-cover {
      width: 100%;
      aspect-ratio: 3/4;
      display: block;
      object-fit: cover;
    }

    .book-cover-fallback {
      width: 100%;
      aspect-ratio: 3/4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: clamp(32px, 8vw, 56px);
      color: rgba(255,255,255,0.8);
    }

    .book-title {
      padding: 11px 12px 13px;
      font-size: clamp(13px, 3.5vw, 17px);
      font-weight: 800;
      color: #3a2c1a;
      text-align: center;
      line-height: 1.3;
    }

    .book-card-skeleton {
      border-radius: 20px;
      overflow: hidden;
      animation: skeleton-pulse 1.4s ease-in-out infinite;
    }

    .skeleton-cover {
      width: 100%;
      aspect-ratio: 3/4;
    }

    .skeleton-title {
      height: 44px;
    }

    @keyframes skeleton-pulse {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 0.85; }
    }

    .empty-state, .error-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 24px;
      font-size: clamp(16px, 4vw, 20px);
      font-weight: 700;
      line-height: 1.6;
    }

    .error-state button {
      margin-top: 16px;
      padding: 10px 24px;
      border-radius: 24px;
      border: none;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 800;
      background: rgba(90,60,20,0.15);
      color: #5a3e28;
    }

    @keyframes pop-in {
      0%   { opacity: 0; transform: scale(0.85) translateY(16px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .parent-link {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 999px;
      box-shadow: 0 2px 12px rgba(90,60,20,0.14);
      text-decoration: none;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 800;
      color: #9a7a5a;
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .parent-link:hover {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 6px 20px rgba(90,60,20,0.2);
    }
    .parent-link:active {
      transform: scale(0.95);
      transition-duration: 0.08s;
    }
    .parent-link-icon {
      font-size: 16px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="header-wrap" id="header-wrap">
    <header>
      <div class="header-title">Storytime</div>
      <div class="header-sub">Pick a book to read!</div>
    </header>
  </div>

  <div class="grid" id="grid"></div>

  <a href="/parent" class="parent-link">
    <span class="parent-link-icon">🔑</span>
    <span>For Parents</span>
  </a>

  <script src="/picker.js"></script>
</body>
</html>
