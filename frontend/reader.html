<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Storytime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100dvh;
      overflow: hidden;
      background: #ffd6d6;
      font-family: 'Nunito', sans-serif;
      touch-action: none;
    }

    /* ── Page backgrounds cycle per page ── */
    .bg-0 { background: #ffd6d6; }
    .bg-1 { background: #c8f5e0; }
    .bg-2 { background: #c8e8ff; }
    .bg-3 { background: #ffefc8; }
    .bg-4 { background: #e8c8ff; }
    .bg-5 { background: #fff8f0; }

    /* ── Slide stage ── */
    #stage {
      position: fixed; inset: 0;
      overflow: hidden;
    }

    /* ── Each page slot ── */
    .page-slot {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
    }

    /* ── Book image ── */
    .page-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      object-position: center;
    }

    /* ── Top scrim + title ── */
    .top-scrim {
      position: absolute; top: 0; left: 0; right: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.45) 0%, transparent 100%);
      padding: 20px 70px 56px;
      pointer-events: none;
      z-index: 10;
    }

    .book-title {
      color: white;
      font-size: clamp(16px, 4vw, 26px);
      font-weight: 900;
      text-align: center;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      letter-spacing: 0.3px;
    }

    /* ── Side nav arrows ── */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      width: 56px; height: 56px;
      background: rgba(255,255,255,0.88);
      border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: #555;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      transition: opacity 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-arrow:active { transform: translateY(-50%) scale(0.92); }
    .nav-arrow.hidden-arrow { opacity: 0; pointer-events: none; }
    #prev-btn { left: 14px; }
    #next-btn { right: 14px; }

    /* ── Bottom panel ── */
    .bottom-panel {
      position: absolute; bottom: 0; left: 0; right: 0;
      z-index: 10;
      background: linear-gradient(to top, rgba(255,255,255,0.97) 0%, rgba(255,255,255,0.93) 55%, transparent 100%);
      padding: 52px 24px 24px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }

    /* ── Page text ── */
    .page-text {
      font-size: clamp(17px, 4vw, 26px);
      font-weight: 700;
      color: #2d2d2d;
      text-align: center;
      line-height: 1.5;
      max-width: 560px;
    }

    /* ── Play button ── */
    .play-btn {
      width: 88px; height: 88px;
      border-radius: 50%;
      border: none; cursor: pointer;
      background: linear-gradient(135deg, #ff6b6b, #ff9a3c);
      box-shadow: 0 6px 24px rgba(255,100,60,0.42);
      display: flex; align-items: center; justify-content: center;
      position: relative;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s;
    }
    .play-btn:active { transform: scale(0.93); }
    .play-btn:disabled {
      background: #d1d5db;
      box-shadow: none;
      cursor: not-allowed;
    }
    .play-btn svg { width: 34px; height: 34px; fill: white; margin-left: 4px; }
    .play-btn.pause-state svg { margin-left: 0; }

    /* Pulse ring when playing */
    .play-btn::after {
      content: '';
      position: absolute; inset: -10px;
      border-radius: 50%;
      border: 3px solid rgba(255,107,107,0.0);
      transition: none;
    }
    .play-btn.playing::after {
      animation: pulse-ring 1.2s ease-out infinite;
    }
    @keyframes pulse-ring {
      0%   { border-color: rgba(255,107,107,0.5); transform: scale(1); }
      100% { border-color: rgba(255,107,107,0); transform: scale(1.45); }
    }

    /* ── Page dots ── */
    .dots {
      display: flex; gap: 8px; align-items: center;
    }
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #d1d5db;
      transition: background 0.2s, transform 0.2s;
    }
    .dot.active {
      background: #ff6b6b;
      transform: scale(1.35);
    }

    /* ── Auto-play toggle ── */
    .autoplay-row {
      display: flex; align-items: center; gap: 8px;
    }
    .toggle {
      width: 44px; height: 24px;
      background: #d1d5db;
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      border: none;
      -webkit-tap-highlight-color: transparent;
    }
    .toggle.on { background: #ff6b6b; }
    .toggle::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      background: white;
      border-radius: 50%;
      top: 2px; left: 2px;
      transition: left 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.22);
    }
    .toggle.on::after { left: 22px; }
    .autoplay-label {
      font-size: 13px; font-weight: 700;
      color: #888;
    }

    /* ── Loading / error states ── */
    #loading-screen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #fff8f0; z-index: 999;
      font-size: 18px; font-weight: 700; color: #aaa;
    }
  </style>
</head>
<body>

<div id="loading-screen">Loading book…</div>

<div id="stage"></div>

<!-- Nav arrows (outside stage so they persist across transitions) -->
<button class="nav-arrow hidden-arrow" id="prev-btn" aria-label="Previous page">&#8249;</button>
<button class="nav-arrow hidden-arrow" id="next-btn" aria-label="Next page">&#8250;</button>

<script src="/reader.js"></script>
</body>
</html>
